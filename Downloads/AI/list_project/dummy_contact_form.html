<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Dummy Contact Form</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; }
        input, textarea, select { width: 100%; padding: 8px; margin-top: 5px; }
        button { padding: 10px 20px; background: blue; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <h1>お問い合わせフォーム (テスト用)</h1>
    <form action="#" method="post">
        <div class="form-group">
            <label for="company">会社名</label>
            <input type="text" id="company" name="company_name" placeholder="例: 株式会社サンプル">
        </div>
        <div class="form-group">
            <label for="name">お名前</label>
            <input type="text" id="name" name="your_name" placeholder="例: 山田 太郎">
        </div>
        <div class="form-group">
            <label for="name_kana">フリガナ (カタカナ)</label>
            <input type="text" id="name_kana" name="name_kana" placeholder="例: ヤマダ タロウ">
        </div>
        <div class="form-group">
            <label for="email">メールアドレス</label>
            <input type="email" id="email" name="email" placeholder="例: info@example.com">
        </div>
        <div class="form-group">
            <label for="tel">電話番号</label>
            <input type="tel" id="tel" name="tel" placeholder="例: 03-1234-5678">
        </div>
        <div class="form-group">
            <label for="address">ご住所</label>
            <input type="text" id="address" name="address" placeholder="例: 東京都...">
        </div>
        <div class="form-group">
            <label for="capital">資本金</label>
            <input type="text" id="capital" name="capital" required>
        </div>
        <div class="form-group">
            <label for="employees">従業員数</label>
            <input type="text" id="employees" name="employees" required>
        </div>
        <div class="form-group">
            <label for="message">お問い合わせ内容</label>
            <textarea id="message" name="message" rows="5"></textarea>
        </div>
        
        <!-- Mock reCAPTCHA -->
        <div class="form-group">
            <div class="g-recaptcha" data-sitekey="dummy"></div>
            <p style="color: red; font-size: 0.8em;">(reCAPTCHA placeholder)</p>
        </div>

        <button type="submit">送信する</button>
    </form>
</body>
</html>
