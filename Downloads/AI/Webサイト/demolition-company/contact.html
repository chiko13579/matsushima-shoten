<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>お問い合わせ - ◯◯解体</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header class="header">
        <div class="container header__container">
            <h1 class="header__logo"><a href="index.html">◯◯解体<span>.</span></a></h1>
            <nav class="header__nav">
                <ul class="header__nav-list">
                    <li class="header__nav-item"><a href="index.html">TOP</a></li>
                    <li class="header__nav-item"><a href="company.html">COMPANY</a></li>
                    <li class="header__nav-item"><a href="contact.html" class="btn btn--accent">CONTACT</a></li>
                </ul>
            </nav>
            <button class="header__hamburger js-hamburger">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </div>
    </header>

    <main>
        <section class="section">
            <div class="container">
                <h2 class="section__title">お問い合わせ</h2>
                <p style="text-align: center; margin-bottom: 2rem;">
                    お見積りやご相談は無料です。<br>
                    お急ぎの方はお電話（000-0000-0000）でも受け付けております。
                </p>

                <form class="contact__form contact-form">
                    <div class="form-group">
                        <label for="name">お名前 <span style="color: red;">*</span></label>
                        <input type="text" id="name" name="name" required placeholder="例：山田 太郎">
                    </div>
                    <div class="form-group">
                        <label for="email">メールアドレス <span style="color: red;">*</span></label>
                        <input type="email" id="email" name="email" required placeholder="例：info@example.com">
                    </div>
                    <div class="form-group">
                        <label for="message">お問い合わせ内容 <span style="color: red;">*</span></label>
                        <textarea id="message" name="message" required placeholder="ご相談内容をご記入ください"></textarea>
                    </div>
                    <button type="submit" class="btn btn--submit">送信する</button>
                </form>
            </div>
        </section>
    </main>

    <footer class="footer">
        <div class="container">
            <nav class="footer__nav">
                <a href="index.html">ホーム</a>
                <a href="company.html">会社案内</a>
                <a href="contact.html">お問い合わせ</a>
                <a href="privacy.html">プライバシーポリシー</a>
            </nav>
            <p class="footer__copyright">&copy; 2024 ◯◯解体 All Rights Reserved.</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>

</html>
